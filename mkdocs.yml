site_name: Creality K2 Plus — Helper Script Wiki
site_description: Complete guide to rooting the Creality K2 Plus and K2 Plus Combo and adding features with the Creality K2 Plus Helper Script.
site_url: https://sw3defy.github.io/Creality-Helper-Script-Wiki-K2-Plus/

repo_name: GitHub
repo_url: https://github.com/sw3defy/Creality-Helper-Script-Wiki-K2-Plus

theme:
  name: material
  language: en
  logo: assets/img/home/logo.png
  favicon: assets/img/home/favicon.png
  icon:
    repo: material/github
    admonition:
      note: material/information
  font:
    text: Roboto
    code: Roboto Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Dark Mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Light Mode
  features:
    - navigation.indexes
    - navigation.top
    - navigation.sections
    - navigation.expand
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

extra_css:
  - assets/css/custom.css

plugins:
  - search
  - glightbox

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sw3defy/Creality-Helper-Script-Wiki-K2-Plus

nav:
  - About:
      - About: index.md
      - Changelog: changelog.md
      - Discussions: https://github.com/sw3defy/Creality-Helper-Script-Wiki-K2-Plus/discussions
      - Special Thanks: special-thanks.md
      - No Camera Support for Fluidd/Mainsail: configurations/configure-camera.md

  - Firmwares:
      - Firmwares: firmwares/index.md
      - Install & Update Firmware: firmwares/install-and-update-rooted-firmware-k2plus.md
      - Restore Previous Firmware: firmwares/restore-previous-firmware-k2plus.md
      - Reset Factory Settings: firmwares/reset-factory-settings.md
      - SSH Connection: firmwares/ssh-connection.md
      - Change Date & Time: firmwares/change-date-and-time.md

  - Helper Script for Creality K2 Plus:
      - Helper Script for Creality K2 Plus: helper-script/index.md
      - Install Helper Script: helper-script/helper-script-installation.md
      - Install Menu:
          - Install Menu: helper-script/install-menu/index.md
          - Moonraker Extensions: helper-script/moonraker-k2plus.md
          - Fluidd (update / repair): helper-script/fluidd-k2plus.md
