site_name: Wiki for Creality Helper Script
site_description: Documentation

repo_name: GitHub
repo_url: https://github.com/Guilouz/Creality-Helper-Script-Wiki

theme:
    name: material
    language: en
    logo: assets/img/home/logo.png
    favicon: assets/img/home/favicon.png
    icon:
        repo: material/github
        admonition:
            note: material/information
    font:
        text: Roboto
        code: Roboto Mono
    palette:
        - media: "(prefers-color-scheme: light)"
          scheme: default
          primary: custom
          accent: custom
          toggle:
            icon: material/brightness-7
            name: Dark Mode
        - media: "(prefers-color-scheme: dark)"
          scheme: slate
          primary: custom
          accent: custom
          toggle:
            icon: material/brightness-4
            name: Light Mode
    features:
        - content.code.copy
        - content.code.annotate
        - navigation.top
        - navigation.indexes
        - navigation.sections
        - search.highlight
        - search.share
        - search.suggest
extra_css:
    - ./assets/stylesheets/extra.css
    - ./assets/stylesheets/glightbox.min.css
extra_javascript:
    - ./assets/javascripts/glightbox.min.js
    - ./assets/javascripts/external_links.js
plugins:
    - search
    - glightbox:
        touchNavigation: true
        loop: false
        effect: zoom
        slide_effect: slide
        width: 100%
        height: auto
        zoomable: true
        draggable: true
        skip_classes:
            - zoom-off
        auto_caption: false
        caption_position: bottom
copyright: Guislain Cyril &copy; All rights reserved
extra:
  generator: false
  social:
    - icon: simple/kofi
      link: https://ko-fi.com/guilouz
    - icon: simple/github
      link: https://github.com/Guilouz
    - icon: simple/tiktok
      link: https://tiktok.com/@guilouz
    - icon: simple/x
      link: https://twitter.com/Guilouz
markdown_extensions:
    - attr_list
    - md_in_html
    - meta
    - tables
    - def_list
    - pymdownx.critic
    - pymdownx.caret
    - pymdownx.keys
    - pymdownx.mark
    - pymdownx.tilde
    - pymdownx.inlinehilite
    - pymdownx.snippets
    - admonition
    - pymdownx.details
    - pymdownx.superfences
    - toc:
        title: On this page
    - pymdownx.highlight:
        anchor_linenums: true
        line_spans: __span
        pygments_lang_class: true
    - pymdownx.emoji:
        emoji_index: !!python/name:material.extensions.emoji.twemoji
        emoji_generator: !!python/name:materialx.emoji.to_svg

